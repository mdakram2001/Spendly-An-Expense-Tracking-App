{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="expense-form-section">
    <h1>Edit Expense</h1>
    {% if error %}
        <div class="form-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}">
        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" name="amount" id="amount" value="{{ expense['amount'] }}" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category" required>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == expense['category'] %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" name="date" id="date" value="{{ expense['date'] }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea name="description" id="description">{{ expense['description'] }}</textarea>
        </div>
        <button type="submit" class="btn-submit">Save Changes</button>
    </form>
</section>
{% endblock %}
